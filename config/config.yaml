# ============================================================
# Multi-Asset Stock Prediction Research — Configuration
# ============================================================

# --- Data ---
data:
  stocks: ["AAPL", "MSFT", "JPM", "XOM", "AMZN"]
  market_index: "^GSPC"
  vix_index: "^VIX"
  start_date: "2015-01-01"
  end_date: null  # null = today

# --- Feature Engineering ---
features:
  price:
    lag_windows: [1, 3, 5]
    ma_windows: [5, 20]
  volume:
    avg_windows: [5, 20]
    high_volume_threshold: 1.2
  volatility:
    rv_windows: [5, 20]
    atr_window: 5

# --- Modelling ---
modelling:
  train_test_split: 0.8
  random_state: 42
  time_series_splits: 5

  linear:
    ridge_alpha: 1.0
    lasso_alpha: 0.001
    elasticnet_alpha: 0.001
    elasticnet_l1_ratio: 0.5

  tree:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: null

  ensemble:
    voting_n_estimators: 100
    stacking_passthrough: true

  tuning:
    n_iter: 20
    cv_splits: 3
    rf_param_grid:
      n_estimators: [100, 200, 300]
      max_depth: [5, 10, null]
      min_samples_split: [2, 5, 10]
      max_features: ["sqrt", "log2"]
    et_param_grid:
      n_estimators: [100, 200, 300]
      max_depth: [5, 10, null]
      min_samples_split: [2, 5, 10]
      max_features: ["sqrt", "log2"]
    xgb_param_grid:
      n_estimators: [100, 200, 300]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.7, 0.8, 1.0]
    lgb_param_grid:
      n_estimators: [100, 200, 300]
      max_depth: [5, 10, -1]
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves: [31, 63, 127]

# --- Research Extensions ---
research:
  causal_inference:
    max_lag: 5
    significance_level: 0.05
    test_features:
      - "Market_Return"
      - "VIX_Change"
      - "RV_5"
      - "Volume_Surprise"
      - "Momentum"

  feature_stability:
    window_size: 504   # ~2 years of trading days
    step_size: 126     # ~6 months
    top_n_features: 5

  transfer_learning:
    n_estimators: 100
    scale_features: true

  regime_detection:
    n_regimes: 3
    method: "gmm"      # "gmm" | "kmeans"

# --- Plotting ---
plotting:
  figsize: [12, 6]
  style: "seaborn-v0_8-whitegrid"
  top_n_features: 10
  dpi: 150
